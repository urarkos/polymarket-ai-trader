name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: "0cc4774e-7493-42a4-8021-a9124ce373ad"
          RAILWAY_SERVICE_NAME: "polymarket-ai"
        run: railway up --service polymarket-ai --environment production --detach
